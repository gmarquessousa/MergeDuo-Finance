name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  react:
    name: React
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: MergeDuo.React

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: MergeDuo.React/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  dotnet:
    name: .NET
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        solution:
          - MergeDuo.Microservices/MergeDuo.Aggregates/MergeDuo.Aggregates.sln
          - MergeDuo.Microservices/MergeDuo.Cards/MergeDuo.Cards.sln
          - MergeDuo.Microservices/MergeDuo.Copilot/MergeDuo.Copilot.sln
          - MergeDuo.Microservices/MergeDuo.FixedRules/MergeDuo.FixedRules.sln
          - MergeDuo.Microservices/MergeDuo.Identity/MergeDuo.Identity.sln
          - MergeDuo.Microservices/MergeDuo.Partnership/MergeDuo.Partnership.sln
          - MergeDuo.Microservices/MergeDuo.Profile/MergeDuo.Profile.sln
          - MergeDuo.Microservices/MergeDuo.Scheduler/MergeDuo.Scheduler.sln
          - MergeDuo.Microservices/MergeDuo.Transactions/MergeDuo.Transactions.sln

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore "${{ matrix.solution }}"

      - name: Test
        run: dotnet test "${{ matrix.solution }}" --configuration Release --no-restore

  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: MergeDuo.Terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Init without backend
        run: terraform init -backend=false

      - name: Format
        run: terraform fmt -check -recursive

      - name: Validate
        run: terraform validate
